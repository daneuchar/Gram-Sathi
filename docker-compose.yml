services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gramvaani
      POSTGRES_PASSWORD: gramvaani
      POSTGRES_DB: gramvaani
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gramvaani"]
      interval: 5s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    command: --dev --node-ip 0.0.0.0

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONPATH=/app/src
      - DATABASE_URL=postgresql+asyncpg://gramvaani:gramvaani@postgres:5432/gramvaani
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000

  agent:
    build: .
    env_file: .env
    environment:
      - PYTHONPATH=/app/src
      - DATABASE_URL=postgresql+asyncpg://gramvaani:gramvaani@postgres:5432/gramvaani
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    command: uv run python -m app.livekit_agent dev

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${PUBLIC_URL:-http://localhost:8000}
        - NEXT_PUBLIC_LIVEKIT_URL=${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
