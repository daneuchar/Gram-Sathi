version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    environment:
      - PYTHONPATH=/app/src

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gramvaani
      POSTGRES_PASSWORD: gramvaani
      POSTGRES_DB: gramvaani
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gramvaani"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - backend

# NOTE: Redis intentionally omitted for prototype.
# Using cachetools in-memory TTL cache (src/app/cache.py).
# Production: add redis service + swap cache.py for async Redis client.
